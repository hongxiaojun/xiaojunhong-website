baseURL = "https://xiaojunhong.space/"
locale = "zh-CN"
title = "xiaojunhong.space"

# Build settings
disableKinds = ["taxonomy", "term"]
enableRobotsTXT = true
metaDataFormat = "yaml"

# Language settings (for bilingual support later)
defaultContentLanguage = "zh"
[languages]
  [languages.zh]
    label = "中文"
    weight = 1
  [languages.en]
    label = "English"
    weight = 2

# Menu configuration
[menu]
  [[menu.main]]
    name = "Articles"
    url = "/articles/"
    weight = 1
  [[menu.main]]
    name = "Notes"
    url = "/notes/"
    weight = 2
  [[menu.main]]
    name = "GitHub"
    url = "/github/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 4

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allow HTML in markdown
  [markup.highlight]
    style = "github"
    lineNos = false
    tabWidth = 2

# Output formats
[outputs]
  home = ["HTML"]
  section = ["HTML"]
  page = ["HTML"]

# Privacy settings (for GDPR compliance)
[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true

# Homepage featured articles settings
[params]
  # Number of latest articles to show on homepage (in addition to featured articles)
  latestArticlesCount = 2
  # Maximum total articles to show on homepage
  maxHomepageArticles = 6

# Server settings for Cloudflare Pages
[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = false
