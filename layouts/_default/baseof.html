<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Title }} - Personal website for articles and notes{{ end }}">
    <link rel="icon" type="image/x-icon" href="{{ .Site.BaseURL }}favicon.ico">
    <link rel="shortcut icon" href="{{ .Site.BaseURL }}favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Kami-inspired Paper Design System */
            --parchment: #f5f4ed;
            --ivory: #faf9f5;
            --warm-sand: #e8e6dc;
            --dark-surface: #30302e;
            --deep-dark: #141413;

            /* Kami brand colors - ink blue accent */
            --brand: #1B365D;
            --brand-light: #2D5A8A;

            /* Kami neutrals - warm tones only */
            --near-black: #141413;
            --dark-warm: #3d3d3a;
            --olive: #504e49;
            --stone: #6b6a64;

            /* Kami borders */
            --border: #e8e6dc;
            --border-soft: #e5e3d8;

            /* Legacy compatibility */
            --color-bg: var(--parchment);
            --color-bg-alt: var(--ivory);
            --color-text: var(--near-black);
            --color-text-light: var(--olive);
            --color-text-lighter: var(--stone);
            --color-border: var(--border);
            --color-border-light: var(--border-soft);
            --color-accent: var(--brand);
            --color-accent-light: var(--brand-light);

            /* Spacing */
            --spacing-unit: 8px;
            --max-width: 1200px;
            --content-max-width: 720px;
            --toc-width: 240px;

            /* Kami Typography */
            --serif: Charter, Georgia, "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", "STSong", "PMingLiU", Palatino, serif;
            --sans: var(--serif);
            --mono: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, Monaco, "Courier New", monospace;
        }

        [data-theme="dark"] {
            --color-bg: #1a1a1a;
            --color-bg-alt: #242424;
            --color-text: #e0e0e0;
            --color-text-light: #a0a0a0;
            --color-text-lighter: #707070;
            --color-border: #333333;
            --color-border-light: #2a2a2a;
            --color-accent: #4da6ff;
            --color-accent-light: #1a3a5c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--serif);
            font-size: 16px;
            line-height: 1.55;
            color: var(--color-text);
            background-color: var(--parchment);
            background-image: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.3s ease, color 0.3s ease;
            letter-spacing: 0.35px;
        }

        /* Keep dot pattern for non-paper sections (homepage) */
        body.homepage {
            background-image: radial-gradient(circle, #e8e6e1 1px, transparent 1px);
            background-size: 8px 8px;
            background-position: 0 0;
        }

        /* Remove dot pattern in dark mode for paper feel */
        [data-theme="dark"] body {
            background-color: var(--deep-dark);
            background-image: none;
        }

        a {
            color: var(--color-text);
            text-decoration: none;
            transition: color 0.2s ease, background-color 0.2s ease;
        }

        a:hover {
            color: var(--color-accent);
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--color-bg-alt);
            border: 1px solid var(--color-border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .theme-toggle:hover {
            background: var(--color-accent-light);
            border-color: var(--color-accent);
            transform: scale(1.05);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
            fill: var(--color-text);
            transition: fill 0.3s ease;
        }

        [data-theme="dark"] .theme-toggle .sun-icon {
            display: block;
        }

        [data-theme="dark"] .theme-toggle .moon-icon {
            display: none;
        }

        .theme-toggle .sun-icon {
            display: none;
        }

        .theme-toggle .moon-icon {
            display: block;
        }

        /* Header */
        header {
            border-bottom: 1px solid var(--color-border);
            padding: 20px 0;
            margin-bottom: 40px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand a {
            font-size: 20px;
            font-weight: 500;
            font-family: var(--serif);
            color: var(--color-text);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-link {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .site-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .site-title {
            font-size: 20px;
            font-weight: 500;
            font-family: var(--serif);
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            font-family: var(--serif);
            color: var(--color-text-light);
            position: relative;
        }

        .nav-links a:hover {
            color: var(--color-accent);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--color-accent);
            transition: width 0.2s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Main content */
        main {
            min-height: 60vh;
        }

        /* Homepage */
        .homepage {
            max-width: var(--max-width);
            margin: 0 auto;
        }

        /* Hero Section */
        .hero-section {
            padding: 80px 0 60px;
            border-bottom: 1px solid var(--color-border-light);
        }

        .hero-content {
            max-width: var(--content-max-width);
        }

        .hero-location {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text-lighter);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
            color: var(--color-text);
            min-height: 58px;
        }

        .typing-container {
            display: inline;
        }

        .hero-learning {
            color: #4A90A4;
            font-weight: 700;
        }

        .hero-building {
            color: #722F37;
            font-weight: 700;
        }

        .hero-sharing {
            color: #D4A574;
            font-weight: 700;
        }

        .hero-emphasis {
            color: #722F37;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background-color: #D4A574;
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .hero-emphasis {
            color: var(--color-accent);
        }

        .hero-description {
            max-width: 600px;
        }

        .hero-subtitle {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--color-text-light);
            font-style: italic;
        }

        .hero-text {
            font-size: 17px;
            line-height: 1.8;
            color: var(--color-text-light);
            margin: 0;
        }

        /* Hero Metadata */
        .hero-metadata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 32px;
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid var(--color-border-light);
        }

        .metadata-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metadata-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--color-text-lighter);
        }

        .metadata-value {
            font-size: 14px;
            color: var(--color-text);
        }

        /* Section Headers */
        .section-header {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .section-subtitle {
            font-size: 16px;
            color: var(--color-text-light);
            margin-bottom: 16px;
        }

        .section-link {
            display: inline-block;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-accent);
            margin-top: 8px;
        }

        .section-link:hover {
            text-decoration: underline;
        }

        /* Articles Section */
        .articles-section {
            padding: 64px 0;
            border-bottom: 1px solid var(--color-border-light);
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .article-card {
            background-color: var(--ivory);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.15s ease;
            border: 1px solid var(--border);
        }

        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
            border-color: var(--brand);
        }

        .article-card-link {
            display: block;
            padding: 24px;
            height: 100%;
        }

        .article-card-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .article-date {
            font-size: 13px;
            color: var(--color-text-lighter);
            font-weight: 500;
        }

        .article-card-title {
            font-family: var(--serif);
            font-size: 18px;
            font-weight: 500;
            line-height: 1.4;
            color: var(--near-black);
        }

        /* Typography hierarchy - Kami-inspired */
        h1, .hero-title {
            font-family: var(--serif);
            font-size: 48px;
            font-weight: 500;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        h2, .section-title, .quicklink-title {
            font-family: var(--serif);
            font-size: 32px;
            font-weight: 500;
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: 0.4px;
        }

        h3, .article-card-title {
            font-family: var(--serif);
            font-size: 20px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        h4 {
            font-family: var(--serif);
            font-size: 18px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        h5 {
            font-family: var(--serif);
            font-size: 16px;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        h6 {
            font-family: var(--serif);
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        p {
            font-family: var(--serif);
            font-weight: 400;
        }

        .article-card-excerpt {
            font-family: var(--serif);
            font-size: 14px;
            color: var(--olive);
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .tag {
            display: inline-block;
            padding: 3px 10px;
            background-color: var(--ivory);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            font-family: var(--serif);
            color: var(--olive);
            transition: all 0.15s ease;
        }

        .tag:hover {
            background-color: var(--warm-sand);
            border-color: var(--brand);
            color: var(--brand);
        }

        .article-card-meta {
            font-size: 13px;
            color: var(--color-text-lighter);
            margin-top: auto;
            padding-top: 8px;
        }

        /* Quick Links Section */
        .quicklinks-section {
            padding: 64px 0;
        }

        .quicklinks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
        }

        .quicklink-card {
            padding: 32px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .quicklink-card:hover {
            border-color: var(--color-accent);
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.1);
        }

        .quicklink-number {
            font-size: 48px;
            font-weight: 700;
            color: var(--color-accent-light);
            margin-bottom: 16px;
        }

        .quicklink-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .quicklink-description {
            font-size: 15px;
            color: var(--color-text-light);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .quicklink-link {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-accent);
        }

        .quicklink-link:hover {
            text-decoration: underline;
        }

        /* Stats Section */
        .stats-section {
            padding: 48px 0;
            background-color: var(--color-bg-alt);
            border-radius: 8px;
            margin: 64px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 32px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: var(--color-accent);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--color-text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--color-border);
            padding: 48px 0;
            margin-top: 96px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--color-text-light);
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            color: var(--color-text-light);
            font-size: 14px;
        }

        .footer-links a:hover {
            color: var(--color-accent);
        }

        /* Content pages */
        .content {
            max-width: var(--content-max-width);
            margin: 0 auto;
        }

        .article-list {
            list-style: none;
        }

        .article-list li {
            padding: 24px 0;
            border-bottom: 1px solid var(--color-border);
        }

        .article-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .article-meta {
            font-size: 14px;
            color: var(--color-text-light);
        }

        /* Responsive Design - Improved Mobile */
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .theme-toggle {
                top: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
            }

            nav {
                flex-direction: column;
                gap: 16px;
            }

            .nav-links {
                gap: 20px;
                width: 100%;
                justify-content: center;
            }

            .hero-section {
                padding: 48px 0 40px;
            }

            .hero-title {
                font-size: 32px;
                min-height: 40px;
            }

            .hero-description {
                font-size: 16px;
            }

            .hero-metadata {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }

            .section-title {
                font-size: 24px;
            }

            .articles-grid {
                grid-template-columns: 1fr;
            }

            .quicklinks-grid {
                grid-template-columns: 1fr;
            }

            .footer-content {
                flex-direction: column;
                gap: 24px;
                text-align: center;
            }

            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .stats-section {
                margin: 48px 0;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0 16px;
            }

            .hero-title {
                font-size: 28px;
                min-height: 34px;
            }

            .hero-location {
                font-size: 12px;
            }

            .hero-metadata {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .hero-subtitle {
                font-size: 20px;
            }

            .nav-links {
                flex-wrap: wrap;
                gap: 16px;
            }

            .theme-toggle {
                top: 12px;
                right: 12px;
                width: 36px;
                height: 36px;
            }

            .theme-toggle svg {
                width: 18px;
                height: 18px;
            }

            /* Better touch targets on mobile */
            .article-card,
            .quicklink-card {
                padding: 20px;
            }

            .article-card-title {
                font-size: 16px;
            }

            .section-title {
                font-size: 22px;
            }
        }

        /* Reading Progress Bar */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #4A90A4, #722F37, #D4A574);
            transition: width 0.1s ease;
            z-index: 9999;
        }

        /* Back to Top Button */
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: var(--color-bg-alt);
            border: 1px solid var(--color-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 999;
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .back-to-top:hover {
            background: var(--color-accent-light);
            border-color: var(--color-accent);
            transform: translateY(-2px);
        }

        .back-to-top svg {
            width: 20px;
            height: 20px;
            fill: var(--color-text);
        }

        /* Print Styles */
        @media print {
            .theme-toggle,
            header,
            footer,
            .back-link,
            .reading-progress,
            .back-to-top {
                display: none !important;
            }

            body {
                background: white;
                color: black;
                background-image: none;
            }

            .content {
                max-width: 100%;
            }

            .article-body {
                font-size: 12pt;
                line-height: 1.6;
            }

            .article-body h1 {
                font-size: 24pt;
                page-break-after: avoid;
            }

            .article-body h2 {
                font-size: 18pt;
                page-break-after: avoid;
            }

            .article-body h3 {
                font-size: 14pt;
                page-break-after: avoid;
            }

            .article-body p {
                orphans: 3;
                widows: 3;
            }

            .article-body pre {
                background: #f5f5f5;
                border: 1px solid #ddd;
                page-break-inside: avoid;
            }

            .article-body blockquote {
                border-left: 3pt solid #0066cc;
                padding-left: 12pt;
                color: #666;
            }

            .article-body a {
                color: #0066cc;
                text-decoration: underline;
            }

            /* Show URLs after links */
            .article-body a[href^="http"]::after {
                content: " (" attr(href) ")";
                font-size: 0.8em;
                word-break: break-all;
            }

            /* Avoid page breaks */
            h1, h2, h3, h4 {
                page-break-after: avoid;
            }

            img {
                max-width: 100%;
                page-break-inside: avoid;
            }

            table {
                page-break-inside: avoid;
            }

            pre, blockquote {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="reading-progress" id="reading-progress"></div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="moon-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="sun-icon" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </button>

    {{ partial "header.html" . }}
    <main class="container">
        {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}

    <button class="back-to-top" id="back-to-top" aria-label="Back to top">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <script>
    (function() {
        // Theme toggle functionality
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;

        // Check for saved theme preference or default to light mode
        const currentTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', currentTheme);

        themeToggle.addEventListener('click', function() {
            const theme = html.getAttribute('data-theme');
            const newTheme = theme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Respect system preference
        if (window.matchMedia && !localStorage.getItem('theme')) {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
            if (prefersDark.matches) {
                html.setAttribute('data-theme', 'dark');
            }
            prefersDark.addEventListener('change', function(e) {
                if (!localStorage.getItem('theme')) {
                    html.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                }
            });
        }
    })();

    // Reading Progress Bar
    (function() {
        const progressBar = document.getElementById('reading-progress');
        if (!progressBar) return;

        function updateProgress() {
            const windowHeight = window.innerHeight;
            const documentHeight = document.documentElement.scrollHeight - windowHeight;
            const scrolled = window.scrollY;
            const progress = (scrolled / documentHeight) * 100;
            progressBar.style.width = Math.min(progress, 100) + '%';
        }

        window.addEventListener('scroll', updateProgress);
        updateProgress();
    })();

    // Back to Top Button
    (function() {
        const backToTop = document.getElementById('back-to-top');
        if (!backToTop) return;

        function toggleBackToTop() {
            if (window.scrollY > 300) {
                backToTop.classList.add('visible');
            } else {
                backToTop.classList.remove('visible');
            }
        }

        backToTop.addEventListener('click', function() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        window.addEventListener('scroll', toggleBackToTop);
        toggleBackToTop();
    })();
    </script>
</body>
</html>
