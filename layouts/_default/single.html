{{ define "main" }}
<article class="content">
    <header class="article-header">
        <h1 class="article-title">{{ .Title }}</h1>
        <div class="article-meta">
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
            {{ if .Params.readingTime }}
            <span class="meta-separator">·</span>
            <span>{{ .Params.readingTime }} min read</span>
            {{ end }}
        </div>
    </header>

    <div class="article-body">
        {{ .Content }}
    </div>

    <footer class="article-footer">
        <a href="{{ .Section | relURL }}" class="back-link">← Back to {{ .Section }}</a>
    </footer>
</article>

<style>
    .article-header {
        margin-bottom: 48px;
    }

    .article-title {
        font-size: 40px;
        font-weight: 700;
        line-height: 1.2;
        margin-bottom: 16px;
        color: var(--color-text);
    }

    .article-meta {
        font-size: 14px;
        color: var(--color-text-light);
    }

    .meta-separator {
        margin: 0 8px;
    }

    .article-body {
        font-size: 17px;
        line-height: 1.8;
        color: var(--color-text);
        max-width: 680px;
    }

    .article-body h2 {
        font-size: 28px;
        font-weight: 700;
        margin-top: 48px;
        margin-bottom: 20px;
        line-height: 1.3;
    }

    .article-body h3 {
        font-size: 22px;
        font-weight: 600;
        margin-top: 36px;
        margin-bottom: 16px;
        line-height: 1.4;
    }

    .article-body h4 {
        font-size: 19px;
        font-weight: 600;
        margin-top: 28px;
        margin-bottom: 12px;
        line-height: 1.4;
    }

    .article-body p {
        margin-bottom: 16px;
    }

    .article-body a {
        color: var(--color-accent);
        text-decoration: underline;
    }

    .article-body code {
        background-color: #f5f5f5;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 0.9em;
    }

    .article-body pre {
        background-color: #f5f5f5;
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
        margin-bottom: 16px;
    }

    .article-body pre code {
        background-color: transparent;
        padding: 0;
    }

    .article-body blockquote {
        border-left: 4px solid var(--color-accent);
        padding-left: 16px;
        margin-left: 0;
        color: var(--color-text-light);
        font-style: italic;
    }

    .article-body ul,
    .article-body ol {
        margin-left: 24px;
        margin-bottom: 16px;
    }

    .article-body li {
        margin-bottom: 8px;
    }

    .article-body img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        margin: 24px 0;
    }

    .article-footer {
        margin-top: 64px;
        padding-top: 32px;
        border-top: 1px solid var(--color-border);
    }

    .back-link {
        font-size: 14px;
        color: var(--color-text-light);
    }

    .back-link:hover {
        color: var(--color-accent);
    }
</style>
{{ end }}
