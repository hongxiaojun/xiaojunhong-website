<header>
    <div class="container">
        <nav>
            <div class="nav-brand">
                <a href="{{ .Site.BaseURL }}" class="brand-link">
                    <img src="/logo.png" alt="{{ .Site.Title }} Logo" class="site-logo">
                    <span class="site-title">{{ .Site.Title }}</span>
                </a>
            </div>
            <div class="nav-links">
                {{ range .Site.Menus.main }}
                <a href="{{ .URL }}">{{ .Name }}</a>
                {{ end }}
            </div>
        </nav>
    </div>
</header>
